<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="bROqHRpnP3dGq455SRd6__2Sj9CSjM5ZyOl8-hrYupw" />
<title>堺市の左官・漆喰・モールテックス施工なら中元工房｜PWNK</title>
<meta name="description" content="大阪府堺市で漆喰塗りや左官工事をお探しなら中元工房（PWNK）へ。モールテックスや和漆喰、珪藻土など素材の魅力を活かした職人直営の施工をご提案。左官技能士としての実績で、質の高い仕上げをお約束します。">
<meta name="keywords" content="左官, 堺市, 大阪, モールテックス, 漆喰, 塗り壁, PWNK, パンク">

<meta property="og:site_name" content="中元工房（PWNK）">
<meta property="og:image" content="images/pwnk-official-logo-square.png">
<link rel="icon" href="images/pwnk-official-logo-square.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;700&display=swap');

/* V1の配色・デザインを完全復元 */
:root { --bg:#0d0d0d; --fg:#f2f2f2; --accent:#c1a35f; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--fg); font-family:'Noto Sans JP', sans-serif; line-height:1.7; overflow-x:hidden; }

/* Header & Logo */
header { position:fixed; top:0; left:0; width:100%; height:80px; display:flex; align-items:center; justify-content:space-between; padding:0 40px; z-index:100; mix-blend-mode:difference; }
.logo { font-family:'Cormorant Garamond', serif; font-size:24px; letter-spacing:0.1em; font-weight:300; display: flex; align-items: center; }
/* V2で追加したロゴ画像もV1の雰囲気を壊さないよう調整 */
.logo img { height: 32px; margin-right: 12px; filter: invert(1); }

/* アフロボタン (V1のデザイン) */
.afro-btn { width:50px; height:50px; cursor:pointer; position:relative; z-index:110; border:1px solid rgba(242,242,242,0.3); border-radius:50%; display:flex; align-items:center; justify-content:center; transition:0.4s; }
.afro-btn:hover { border-color:var(--accent); }
.afro-icon { width:24px; height:24px; background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 12h6M12 9v6"/></svg>') no-repeat center/contain; transition:0.4s; }
.afro-btn.active .afro-icon { transform:rotate(45deg); }

/* Navigation Overlay */
.fs-nav { position:fixed; top:0; left:0; width:100%; height:100vh; background:rgba(13,13,13,0.95); z-index:105; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.6s ease; }
.fs-nav.active { opacity:1; pointer-events:all; }
.fs-nav-links { text-align:center; }
.fs-nav button { display:block; background:none; border:none; color:var(--fg); font-family:'Cormorant Garamond', serif; font-size:48px; margin:20px 0; cursor:pointer; transition:0.4s; opacity:0; transform:translateY(20px); }
.fs-nav button:hover { color:var(--accent); letter-spacing:0.1em; }

/* Hero Section (V1の力強さを再現) */
#hero { height:100vh; width:100%; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; background: url('images/professional-plastering-tools-osaka-sakai.jpg') no-repeat center center/cover; }
#hero::before { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); }
.hero-content { position:relative; z-index:2; text-align:center; }
#heroTitle { font-family:'Cormorant Garamond', serif; font-size:clamp(40px, 8vw, 100px); font-weight:300; letter-spacing:0.2em; opacity:0; transform:translateY(30px); margin-bottom:10px; }
#heroSub { font-size:14px; letter-spacing:0.8em; text-transform:uppercase; color:var(--accent); opacity:0; }

/* Texture & Material Section */
#work { padding:120px 40px; max-width:1400px; margin:0 auto; }
.section-label { font-family:'Cormorant Garamond', serif; font-size:12px; letter-spacing:0.5em; color:var(--accent); margin-bottom:40px; text-align:center; }
.tex-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:30px; }
.tex-cell { position:relative; overflow:hidden; aspect-ratio:1/1; opacity:0; transform:translateY(30px); }
.tex-cell img { width:100%; height:100%; object-fit:cover; transition:transform 1.2s ease; filter:grayscale(0.3); }
.tex-cell:hover img { transform:scale(1.1); filter:grayscale(0); }
.tex-cell p { position:absolute; bottom:20px; left:20px; font-family:'Cormorant Garamond', serif; font-size:16px; letter-spacing:0.2em; z-index:2; }

/* ... (その他のV1スタイルを100%継承) ... */
#profile, #access, #contact { padding:100px 40px; border-top:1px solid rgba(242,242,242,0.1); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="images/pwnk-osaka-sakai-logo.png" alt="PWNKロゴ">
    pwnk — Osaka
  </div>
  <div class="afro-btn" id="afroBtn">
    <div class="afro-icon"></div>
  </div>
</header>

<nav class="fs-nav" id="fsNav">
  <div class="fs-nav-links">
    <button data-target="#hero">TOP</button>
    <button data-target="#work">WORKS</button>
    <button data-target="#work">MATERIAL</button>
    <button data-target="#profile">ABOUT</button>
    <button data-target="#access">LOCATION</button>
  </div>
</nav>

<main>
  <section id="hero">
    <div class="hero-content">
      <h1 id="heroTitle">中元工房<br><span style="font-size:0.4em;">PWNK — Osaka</span></h1>
      <p id="heroSub">刻まれる光。</p>
    </div>
  </section>

  <section id="work">
    <p class="section-label">TEXTURE & MATERIAL</p>
    <div class="tex-grid">
      <div class="tex-cell">
        <img src="images/shikkui-plaster-finish-osaka-sakai.jpg" alt="漆喰">
        <p>SHIKKUI / 漆喰</p>
      </div>
      <div class="tex-cell">
        <img src="images/natural-plaster-material-osaka-sakai.jpg" alt="素材">
        <p>MATERIAL / 素材</p>
      </div>
      <div class="tex-cell">
        <img src="images/mortar-sculpture-aging-tile-osaka-sakai.jpg" alt="造形">
        <p>SCULPTURE / 造形</p>
      </div>
      <div class="tex-cell">
        <img src="images/mortex-finish-osaka-sakai-sakai.png" alt="モールテックス">
        <p>MORTEX / モールテックス</p>
      </div>
    </div>
  </section>
  
  </main>

<script>
  // V1の動き（GSAP）を完全再現
  const afroBtn = document.getElementById('afroBtn');
  const fsNav = document.getElementById('fsNav');
  const navLinks = document.querySelectorAll('.fs-nav button');

  afroBtn.addEventListener('click', () => {
    afroBtn.classList.toggle('active');
    fsNav.classList.toggle('active');
    if(fsNav.classList.contains('active')){
      gsap.to(navLinks, { opacity:1, y:0, stagger:0.1, duration:0.5, ease:'power2.out' });
    } else {
      gsap.set(navLinks, { opacity:0, y:20 });
    }
  });

  navLinks.forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.querySelector(btn.dataset.target);
      afroBtn.classList.remove('active');
      fsNav.classList.remove('active');
      window.scrollTo({ top: target.offsetTop, behavior: 'smooth' });
    });
  });

  gsap.to('#heroTitle', { opacity:1, y:0, duration:1.5, ease:'power4.out', delay:0.5 });
  gsap.to('#heroSub', { opacity:1, duration:2, delay:1.2 });

  gsap.utils.toArray('.tex-cell').forEach((el, i) => {
    gsap.to(el, { opacity:1, y:0, scrollTrigger:{ trigger:'#work', start:'top 80%' }, duration:0.9, delay:i*0.15 });
  });
</script>
</body>
</html>
