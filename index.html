<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="bROqHRpnP3dGq455SRd6__2Sj9CSjM5ZyOl8-hrYupw" />
<title>堺市の左官・漆喰・モールテックス施工なら中元工房｜PWNK</title>
<meta name="description" content="大阪府堺市で漆喰塗りや左官工事をお探しなら中元工房（PWNK）へ。モールテックスや和漆喰、珪藻土など素材の魅力を活かした職人直営の施工をご提案。左官技能士としての実績で、質の高い仕上げをお約束します。">
<meta name="keywords" content="左官, 堺市, 大阪, モールテックス, 漆喰, 塗り壁, PWNK, パンク">

<meta property="og:site_name" content="中元工房（PWNK）">
<meta property="og:image" content="images/pwnk-official-logo-square.png">

<link rel="icon" href="images/pwnk-official-logo-square.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;700&display=swap');

/* --- 既存のスタイルを維持しつつ、画像パス等を最適化 --- */
:root { --bg:#0d0d0d; --fg:#f2f2f2; --accent:#c1a35f; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--fg); font-family:'Noto Sans JP', sans-serif; line-height:1.7; overflow-x:hidden; }

/* Header & Nav */
header { position:fixed; top:0; left:0; width:100%; height:80px; display:flex; align-items:center; justify-content:space-between; padding:0 40px; z-index:100; mix-blend-mode:difference; }
.logo { font-family:'Cormorant Garamond', serif; font-size:24px; letter-spacing:0.1em; font-weight:300; }
.logo img { height: 40px; vertical-align: middle; margin-right: 10px; }

/* --- 以前のスタイルコードが続く（中略） --- */
/* 変更点：Hero背景の画像パス */
#hero { 
    height:100vh; width:100%; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center;
    background: url('images/professional-plastering-tools-osaka-sakai.jpg') no-repeat center center/cover;
}
#hero::before { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); }

/* Texture & Material Section */
#work { padding:120px 40px; max-width:1400px; margin:0 auto; }
.tex-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr)); gap:40px; margin-top:60px; }
.tex-cell { position:relative; overflow:hidden; aspect-ratio:1/1; opacity:0; transform:translateY(30px); cursor:pointer; }
.tex-cell img { width:100%; height:100%; object-fit:cover; transition:transform 0.8s ease; filter:grayscale(0.2); }
.tex-cell:hover img { transform:scale(1.08); filter:grayscale(0); }
.tex-cell p { position:absolute; bottom:20px; left:20px; font-family:'Cormorant Garamond', serif; font-size:18px; letter-spacing:0.1em; text-transform:uppercase; z-index:2; }

/* 既存の他のスタイル（略） */
/* ... 以下、元コードのスタイル部分をそのまま維持 ... */
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="images/pwnk-osaka-sakai-logo.png" alt="中元工房 PWNK ロゴ">
    pwnk — Osaka
  </div>
  <div class="afro-btn" id="afroBtn">
    <div class="afro-icon"></div>
  </div>
</header>

<div class="fs-nav" id="fsNav">
  <div class="fs-nav-links">
    <button data-target="#hero">TOP</button>
    <button data-target="#work">WORKS</button>
    <button data-target="#work">MATERIAL</button>
    <button data-target="#profile">ABOUT</button>
    <button data-target="#access">LOCATION</button>
  </div>
</div>

<main>
  <section id="hero">
    <div class="hero-content">
      <h1 id="heroTitle">中元工房<br><span style="font-size:0.4em; letter-spacing:0.3em; opacity:0.8;">PWNK — Osaka</span></h1>
      <p id="heroSub">刻まれる光。</p>
    </div>
  </section>

  <section id="work">
    <p class="section-label">TEXTURE & MATERIAL</p>
    <div class="tex-grid">
      <div class="tex-cell">
        <img src="images/shikkui-plaster-finish-osaka-sakai.jpg" alt="大阪・堺市の漆喰塗り壁仕上げ施工例">
        <p>SHIKKUI / 漆喰</p>
      </div>
      <div class="tex-cell">
        <img src="images/natural-plaster-material-osaka-sakai.jpg" alt="厳選された左官素材・漆喰の粉末">
        <p>MATERIAL / 素材</p>
      </div>
      <div class="tex-cell">
        <img src="images/mortar-sculpture-aging-tile-osaka-sakai.jpg" alt="エイジングタイル風のモルタル造形">
        <p>SCULPTURE / 造形</p>
      </div>
      <div class="tex-cell">
        <img src="images/mortex-finish-osaka-sakai-sakai.png" alt="モールテックス仕上げ施工例">
        <p>MORTEX / モールテックス</p>
      </div>
    </div>
  </section>

  </main>

<footer>
  <div class="footer-bottom">
    &copy; 2026 PWNK — Osaka. Nakamoto Koubou.
  </div>
</footer>

<script>
  /* GSAPアニメーションの設定（元コードを維持しつつパスを考慮） */
  // ... 元のスクリプト ...
  gsap.to('#heroTitle', { opacity:1, y:0, duration:1.5, ease:'power4.out', delay:0.5 });
  gsap.to('#heroSub', { opacity:1, duration:2, delay:1.2 });

  // アフロメニューの開閉などの制御
  const afroBtn = document.getElementById('afroBtn');
  const fsNav = document.getElementById('fsNav');
  afroBtn.addEventListener('click', () => {
    afroBtn.classList.toggle('active');
    fsNav.classList.toggle('active');
  });

  // スムーススクロール（現状）
  document.querySelectorAll('.fs-nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.querySelector(btn.dataset.target);
      afroBtn.classList.remove('active');
      fsNav.classList.remove('active');
      window.scrollTo({ top: target.offsetTop, behavior: 'smooth' });
    });
  });

  // スクロールトリガー系
  gsap.utils.toArray('.tex-cell').forEach((el, i) => {
    gsap.to(el, { opacity:1, y:0, scrollTrigger:{ trigger:'#work', start:'top 80%' }, duration:0.9, delay:i*0.15, ease:'power3.out' });
  });
  // ... 以下、残りのアニメーションコード ...
</script>
</body>
</html>
