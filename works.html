<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORKS | PWNK</title>
<link rel="icon" href="images/pwnk-official-logo-square.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Noto+Sans+JP:wght@100;300;400;500&display=swap');

:root {
  --cream: #F5F0E8;
  --teak: #8B6A47;
  --charcoal: #2C2C2C;
  --warm-white: #FAF7F2;
}

body {
  background: var(--warm-white);
  color: var(--charcoal);
  font-family: 'Noto Sans JP', sans-serif;
  overflow-x: hidden;
}

/* ヘッダー・ナビゲーション */
header {
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 100;
  background: rgba(250, 247, 242, 0.8);
  backdrop-filter: blur(5px);
}
.logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; letter-spacing: 0.1em; }
.nav-links { display: flex; gap: 30px; list-style: none; }
.nav-links a { text-decoration: none; color: var(--charcoal); font-size: 13px; letter-spacing: 0.1em; }

/* マトリックスエリア */
.matrix-container {
  width: 100vw;
  height: 100vh;
  position: relative;
  padding-top: 80px;
  display: flex;
  flex-direction: column;
}

.matrix-header {
  text-align: center;
  padding: 20px 0;
}
.matrix-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 300; }

/* 軸ラベル */
.axis-label {
  position: absolute;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--teak);
  font-weight: 500;
  z-index: 10;
  pointer-events: none;
  transition: opacity 0.3s;
}

/* デスクトップ用配置 */
#labelTop { top: 110px; left: 50%; transform: translateX(-50%); }
#labelBottom { bottom: 40px; left: 50%; transform: translateX(-50%); }
#labelLeft { left: 40px; top: 55%; transform: translateY(-50%) rotate(-90deg); }
#labelRight { right: 40px; top: 55%; transform: translateY(-50%) rotate(90deg); }

/* プロットエリア */
.plot-area {
  flex-grow: 1;
  margin: 40px 100px 80px;
  position: relative;
  border-left: 1px solid rgba(139, 106, 71, 0.2);
  border-bottom: 1px solid rgba(139, 106, 71, 0.2);
}

/* 各作品のサムネイル */
.project-item {
  position: absolute;
  width: 80px;
  height: 80px;
  cursor: pointer;
  transform: translate(-50%, -50%);
  transition: transform 0.3s ease;
  z-index: 5;
}
.project-item:hover { z-index: 20; transform: translate(-50%, -50%) scale(1.2); }
.project-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 2px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

/* ツールチップ（作品名） */
.project-title {
  position: absolute;
  bottom: -25px;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  font-size: 10px;
  background: var(--charcoal);
  color: #fff;
  padding: 2px 8px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.project-item:hover .project-title { opacity: 1; }

/* コントロールボタン */
.controls {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 15px;
  z-index: 100;
}
.matrix-btn {
  padding: 10px 20px;
  border: 1px solid var(--teak);
  background: transparent;
  color: var(--teak);
  cursor: pointer;
  font-size: 12px;
  letter-spacing: 0.1em;
  transition: all 0.3s;
}
.matrix-btn.is-active {
  background: var(--teak);
  color: #fff;
}

/* スマホ対応 */
@media (max-width: 768px) {
  .plot-area { margin: 40px 40px 100px; }
  .project-item { width: 60px; height: 60px; }
  #labelLeft { left: 10px; }
  #labelRight { right: 10px; }
  .matrix-header h1 { font-size: 32px; }
  .controls { width: 90%; flex-wrap: wrap; justify-content: center; bottom: 20px; }
  .matrix-btn { padding: 8px 12px; font-size: 10px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">PWNK</div>
  <ul class="nav-links">
    <li><a href="index.html">HOME</a></li>
    <li><a href="works.html">WORKS</a></li>
    <li><a href="contact.html">CONTACT</a></li>
  </ul>
</header>

<div class="matrix-container">
  <div class="matrix-header">
    <h1>WORKS</h1>
  </div>

  <div id="labelTop" class="axis-label">OUTDOOR</div>
  <div id="labelBottom" class="axis-label">INDOOR</div>
  <div id="labelLeft" class="axis-label">FUNCTIONAL</div>
  <div id="labelRight" class="axis-label">DESIGN</div>

  <div class="plot-area" id="plotArea">
    </div>

  <div class="controls">
    <button class="matrix-btn is-active" data-view="space_role">空間と役割</button>
    <button class="matrix-btn" data-view="texture_taste">質感とテイスト</button>
    <button class="matrix-btn" data-view="material_durability">素材と耐久性</button>
  </div>
</div>

<script>
  // 1. 軸の定義
  const axisDefs = {
    space_role: { top: "屋外 / OUTDOOR", bottom: "室内 / INDOOR", left: "実用重視 / FUNCTIONAL", right: "デザイン重視 / DESIGN" },
    texture_taste: { top: "精緻 / SMOOTH", bottom: "無骨 / ROUGH", left: "現代・洋風 / MODERN", right: "伝統・和風 / TRADITIONAL" },
    material_durability: { top: "高機能 / HI-TECH", bottom: "天然素材 / NATURAL", left: "不変・耐久 / DURABLE", right: "風合・変化 / AGING" }
  };

  // 2. 全21枚の施工事例データ（SEOファイル名版）
  const projects = [
    { id: 1, title: "岸和田市 MISONOYA様 門塀モールテックス", img: "images/works/mortex-kishiwada-shop-exterior-entrance-wall.jpg", 
      space_role: { x: 90, y: 15 }, texture_taste: { x: 50, y: 10 }, material_durability: { x: 70, y: 30 } },
    { id: 2, title: "堺市 YZ様邸 LDK 漆喰", img: "images/works/shikkui-sakai-private-interior-ldk.jpg", 
      space_role: { x: 10, y: 80 }, texture_taste: { x: 10, y: 70 }, material_durability: { x: 10, y: 90 } },
    { id: 3, title: "某邸 アクセント壁 モルタル造形", img: "images/works/mortar-decorative-region-shop-interior-accent-wall.jpg", 
      space_role: { x: 85, y: 85 }, texture_taste: { x: 50, y: 20 }, material_durability: { x: 50, y: 70 } },
    { id: 4, title: "堺市 AZ様邸 LDK 漆喰・モールテックス", img: "images/works/shikkui-mortex-sakai-private-interior-ldk.jpg", 
      space_role: { x: 10, y: 85 }, texture_taste: { x: 10, y: 60 }, material_durability: { x: 10, y: 85 } },
    { id: 5, title: "堺市 AZ様邸 階段 モールテックス", img: "images/works/shikkui-mortex-sakai-private-interior-staircase.jpg", 
      space_role: { x: 25, y: 75 }, texture_taste: { x: 30, y: 15 }, material_durability: { x: 80, y: 20 } },
    { id: 6, title: "葛城市 某邸 LDK 漆喰・墨モルタル", img: "images/works/shikkui-mortex-ink-mortar-katuragi-private-interior-ldk.jpg", 
      space_role: { x: 15, y: 80 }, texture_taste: { x: 20, y: 5 }, material_durability: { x: 90, y: 15 } },
    { id: 7, title: "某邸 門柱 特殊仕上げ", img: "images/works/pwnk-region-private-exterior-gatepost.jpg", 
      space_role: { x: 90, y: 10 }, texture_taste: { x: 40, y: 80 }, material_durability: { x: 20, y: 60 } },
    { id: 8, title: "大阪市 よころ様 ファサード", img: "images/works/jolypate-osaka-shop-exterior-facade.jpg", 
      space_role: { x: 85, y: 15 }, texture_taste: { x: 70, y: 50 }, material_durability: { x: 40, y: 30 } },
    { id: 9, title: "大阪市 よころ様 店内壁", img: "images/works/jolypate-osaka-shop-interior-wall.jpg", 
      space_role: { x: 15, y: 70 }, texture_taste: { x: 25, y: 15 }, material_durability: { x: 85, y: 10 } },
    { id: 10, title: "生駒市 YH様邸 洗面漆喰", img: "images/works/shikkui-ikoma-private-interior-washroom.jpg", 
      space_role: { x: 12, y: 88 }, texture_taste: { x: 85, y: 40 }, material_durability: { x: 30, y: 80 } },
    { id: 11, title: "生駒市 YH様邸 LDKアクセント壁", img: "images/works/shikkui-decorative-ikoma-private-interior-ldk-accent-wall.jpg", 
      space_role: { x: 8, y: 15 }, texture_taste: { x: 15, y: 65 }, material_durability: { x: 15, y: 40 } },
    { id: 12, title: "某店 什器モールテックス", img: "images/works/mortex-region-shop-interior-furniture.jpg", 
      space_role: { x: 95, y: 30 }, texture_taste: { x: 60, y: 30 }, material_durability: { x: 60, y: 25 } },
    { id: 13, title: "某店 土間仕上げ", img: "images/works/pwnk-region-shop-interior-doma.jpg", 
      space_role: { x: 10, y: 85 }, texture_taste: { x: 20, y: 10 }, material_durability: { x: 95, y: 20 } },
    { id: 14, title: "豊中市 鼓道様 店内壁", img: "images/works/jyuraku-toyonaka-shop-interior-wall.jpg", 
      space_role: { x: 5, y: 15 }, texture_taste: { x: 10, y: 80 }, material_durability: { x: 10, y: 50 } },
    { id: 15, title: "豊中市 某店 アートウォール", img: "images/works/art-wall-toyonaka-shop-interior-wall.jpg", 
      space_role: { x: 12, y: 85 }, texture_taste: { x: 80, y: 85 }, material_durability: { x: 40, y: 40 } },
    { id: 16, title: "某邸 外壁ジョリパット", img: "images/works/jolypate-region-private-exterior-wall.jpg", 
      space_role: { x: 80, y: 25 }, texture_taste: { x: 65, y: 60 }, material_durability: { x: 35, y: 55 } },
    { id: 17, title: "泉大津市 某邸 LDK漆喰・モールテックス", img: "images/works/mortex-shikkui-izumiotu-private-interior-ldk.jpg", 
      space_role: { x: 12, y: 65 }, texture_taste: { x: 15, y: 5 }, material_durability: { x: 90, y: 10 } },
    { id: 18, title: "京都市 某店 看板・モルタル造形", img: "images/works/mortar-decorative-kyoto-shop-exterior-signboard.jpg", 
      space_role: { x: 95, y: 10 }, texture_taste: { x: 75, y: 95 }, material_durability: { x: 20, y: 50 } },
    { id: 19, title: "藤井寺市 某邸 LDK漆喰・モールテックス", img: "images/works/mortex-shikkui-fujiidera-private-interior-ldk.jpg", 
      space_role: { x: 25, y: 25 }, texture_taste: { x: 35, y: 20 }, material_durability: { x: 80, y: 5 } },
    { id: 20, title: "藤井寺市 某邸 洗面モールテックス", img: "images/works/mortex-shikkui-fujiidera-private-interior-washroom.jpg", 
      space_role: { x: 20, y: 10 }, texture_taste: { x: 20, y: 25 }, material_durability: { x: 70, y: 2 } },
    { id: 21, title: "奈良市 某邸 書斎 珪藻土", img: "images/works/keisoudo-nara-private-interior-studyroom.jpg", 
      space_role: { x: 5, y: 10 }, texture_taste: { x: 10, y: 75 }, material_durability: { x: 15, y: 60 } }
  ];

  const plotArea = document.getElementById('plotArea');
  let projectElements = [];

  // 3. 初期生成
  projects.forEach((proj, index) => {
    const el = document.createElement('div');
    el.className = 'project-item';
    el.innerHTML = `
      <img src="${proj.img}" alt="${proj.title}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
      <div class="project-title">${proj.title}</div>
    `;
    
    // 初期配置（空間と役割）
    const pos = proj.space_role;
    el.style.left = pos.x + "%";
    el.style.top = pos.y + "%";
    
    plotArea.appendChild(el);
    projectElements.push({ element: el, data: proj });
  });

  // 4. 表示切り替え関数
  function updateView(viewId) {
    const def = axisDefs[viewId];
    
    // 軸ラベルの更新
    gsap.to('.axis-label', { opacity: 0, duration: 0.2, onComplete: () => {
      document.getElementById('labelTop').innerText = def.top;
      document.getElementById('labelBottom').innerText = def.bottom;
      document.getElementById('labelLeft').innerText = def.left;
      document.getElementById('labelRight').innerText = def.right;
      gsap.to('.axis-label', { opacity: 1, duration: 0.3 });
    }});

    // 画像の移動
    projectElements.forEach((item, index) => {
      const newPos = item.data[viewId];
      gsap.to(item.element, {
        left: newPos.x + "%",
        top: newPos.y + "%",
        duration: 1.2,
        ease: "power3.inOut",
        delay: index * 0.03
      });
    });
  }

  // 5. ボタンイベント
  const buttons = document.querySelectorAll('.matrix-btn');
  buttons.forEach(btn => {
    btn.addEventListener('click', (e) => {
      buttons.forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      updateView(btn.dataset.view);
    });
  });

</script>
</body>
</html>
